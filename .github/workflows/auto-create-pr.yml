name: Auto Create PR

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Branch to merge from"
        required: false
        default: "master"
      target_branch:
        description: "Branch to merge into"
        required: false
        default: "main"
      pr_title:
        description: "Pull request title"
        required: false
        default: ""
      pr_body:
        description: "Pull request body"
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create pull request when none exists
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const source = core.getInput('source_branch') || 'master';
            const target = core.getInput('target_branch') || 'main';
            const inputTitle = core.getInput('pr_title');
            const inputBody = core.getInput('pr_body');
            const title = inputTitle || `chore: merge ${source} into ${target}`;
            const body = inputBody || `Automated PR to merge \`${source}\` into \`${target}\`.`;

            if (source === target) {
              core.setFailed('source_branch and target_branch must be different');
              return;
            }

            await github.rest.repos.getBranch({ owner, repo, branch: source });
            await github.rest.repos.getBranch({ owner, repo, branch: target });

            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${source}`,
              base: target,
              per_page: 100,
            });

            if (existing.length > 0) {
              core.notice(`Open PR already exists: #${existing[0].number}`);
              return;
            }

            const result = await github.rest.pulls.create({
              owner,
              repo,
              head: source,
              base: target,
              title,
              body,
            });

            core.notice(`Created PR #${result.data.number}`);
