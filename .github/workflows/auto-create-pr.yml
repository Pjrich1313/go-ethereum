name: Auto Create PR

on:
  schedule:
    # Runs every 6 hours at minute 0.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Branch to merge from"
        required: false
        default: "master"
      target_branch:
        description: "Branch to merge into"
        required: false
        default: "master"
      pr_title:
        description: "Pull request title"
        required: false
        default: ""
      pr_body:
        description: "Pull request body"
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create pull request when none exists
        uses: actions/github-script@v7.0.1
        env:
          SOURCE_BRANCH: ${{ github.event.inputs.source_branch || 'master' }}
          TARGET_BRANCH: ${{ github.event.inputs.target_branch || 'master' }}
          PR_TITLE: ${{ github.event.inputs.pr_title || '' }}
          PR_BODY: ${{ github.event.inputs.pr_body || '' }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const source = process.env.SOURCE_BRANCH || 'master';
            const target = process.env.TARGET_BRANCH || 'master';
            const inputTitle = process.env.PR_TITLE;
            const inputBody = process.env.PR_BODY;
            const title = inputTitle || `chore: merge ${source} into ${target}`;
            const body = inputBody || `Automated PR to merge \`${source}\` into \`${target}\`.`;

            if (source === target) {
              core.warning('source_branch and target_branch are the same — skipping PR creation.');
              return;
            }

            try {
              await github.rest.repos.getBranch({ owner, repo, branch: source });
            } catch (error) {
              core.warning(`Source branch does not exist: ${source}. Skipping. Error: ${error.message}`);
              return;
            }

            try {
              await github.rest.repos.getBranch({ owner, repo, branch: target });
            } catch (error) {
              core.warning(`Target branch does not exist: ${target}. Skipping. Error: ${error.message}`);
              return;
            }

            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${source}`,
              base: target,
              per_page: 100,
            });

            if (existing.length > 0) {
              core.notice(`Open PR already exists: #${existing[0].number}`);
              return;
            }

            try {
              const result = await github.rest.pulls.create({
                owner,
                repo,
                head: source,
                base: target,
                title,
                body,
              });
              core.notice(`Created PR #${result.data.number}`);
            } catch (error) {
              const status = error.status || error.response?.status;
              const message = error.response?.data?.message || error.message || '';
              if (status === 422) {
                core.notice(`Skipping PR creation due to validation response: ${message}`);
                return;
              }
              throw error;
            }
