# This workflow creates the Cloudflare D1 database used by the go-ethereum worker.
#
# Run this ONCE before the first deploy to provision the database.
# Subsequent runs are safe — the step checks whether the database already
# exists and skips creation if it does.
#
# Prerequisites (add as repository secrets under Settings > Secrets > Actions):
#   CLOUDFLARE_API_TOKEN  — API token with "Account.D1" write permissions
#   CLOUDFLARE_ACCOUNT_ID — Your Cloudflare account ID
#
# After the database is created, copy the printed database ID into the
# D1_DATABASE_ID repository secret so the deploy workflow can use it.

name: Create Cloudflare D1 Database

on:
  # Allow manual one-shot provisioning
  workflow_dispatch:

jobs:
  create-database:
    name: Provision D1 Database
    runs-on: ubuntu-latest

    # Minimal permissions for GITHUB_TOKEN
    permissions:
      contents: read

    steps:
      # Step 1 — Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Set up Node.js environment
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Step 3 — Install Wrangler CLI
      - name: Install Wrangler
        run: npm install -g wrangler

      # Step 4 — Create the D1 database if it does not already exist.
      #           The database name matches the binding in wrangler.toml
      #           (go-ethereum-worker-db). If the database already exists,
      #           wrangler prints a warning and exits cleanly.
      - name: Create D1 Database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Checking for existing database..."
          if wrangler d1 list | grep -q "go-ethereum-worker-db"; then
            echo "Database 'go-ethereum-worker-db' already exists — skipping creation."
          else
            echo "Creating database 'go-ethereum-worker-db'..."
            wrangler d1 create go-ethereum-worker-db
            echo ""
            echo "✅ Database created. Copy the 'database_id' printed above into the"
            echo "   D1_DATABASE_ID repository secret (Settings > Secrets > Actions)"
            echo "   before running the deploy workflow."
          fi
