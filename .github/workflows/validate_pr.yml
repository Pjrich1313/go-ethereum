name: Validate PR Format

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Check for Spam PR
        uses: actions/github-script@v7
        with:
          script: |
            const prTitle = context.payload.pull_request.title;
            const actor = context.payload.pull_request.user.login;

            // Skip spam check for bots — they use conventional commit prefixes legitimately.
            if (actor.endsWith('[bot]') || actor === 'Copilot') {
              console.log(`✅ Skipping spam check for bot actor: ${actor}`);
            } else {
              const spamRegex = /^(feat|chore|fix)(\(.*\))?\s*:/i;

              if (spamRegex.test(prTitle)) {
                // Leave a comment explaining why
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body: `## PR Closed as Spam

            This PR was automatically closed because the title format \`feat:\`, \`fix:\`, or \`chore:\` is commonly associated with spam contributions.

            If this is a legitimate contribution, please:
            1. Review our contribution guidelines
            2. Use the correct PR title format: \`directory, ...: description\`
            3. Open a new PR with the proper title format

            Thank you for your understanding.`
                });

                // Close the PR
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  state: 'closed'
                });

                core.setFailed('PR closed as spam due to suspicious title format');
                return;
              }
            }

            console.log('✅ PR passed spam check');

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check PR Title Format
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const prTitle = context.payload.pull_request.title;
            // Title must follow: "prefix: description" where prefix may include
            // directory paths (e.g. "accounts/abi/bind"), package names, or
            // comma-separated areas (e.g. "eth, les").
            const titleRegex = /^([\w\s,{}/.]+): .+/;

            if (!titleRegex.test(prTitle)) {
              core.warning(`PR title "${prTitle}" does not match the recommended format: directory, ...: description`);
              console.log('ℹ️  Consider using a title like: accounts/abi/bind: short description');
              // Return early — skip directory check since there is no prefix to validate.
              console.log('✅ PR title format is valid');
              return;
            }

            const match = prTitle.match(titleRegex);
            const dirPart = match[1];
            const directories = dirPart.split(',').map(d => d.trim());
            const missingDirs = [];
            for (const dir of directories) {
              // Only validate the top-level directory component so that paths
              // like "accounts/abi/bind/backends" are accepted when "accounts/"
              // exists in the repository root.  Trim the full path first to
              // avoid leading/trailing whitespace affecting the split.
              const topLevel = dir.trim().split('/')[0].trim();
              const fullPath = path.join(process.env.GITHUB_WORKSPACE, topLevel);
              if (topLevel && !fs.existsSync(fullPath)) {
                missingDirs.push(dir);
              }
            }

            if (missingDirs.length > 0) {
              core.warning(`The following areas in the PR title do not match a top-level directory: ${missingDirs.join(', ')}`);
            }

            console.log('✅ PR title format is valid');

